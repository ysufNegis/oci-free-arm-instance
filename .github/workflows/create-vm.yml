name: Try to Create OCI VM
# It will run every 5 minutes.
on:
  schedule:
    - cron: "*/5 * * * *"
  # Allows you to manually run this workflow from the Actions tab
  workflow_dispatch:
env:
  COMPARTMENT_ID: ${{ secrets.OCI_COMPARTMENT_ID }}
  SUBNET_ID: ${{ secrets.OCI_SUBNET_ID }}
  AD_NAME: "QSEi:EU-PARIS-1-AD-1"
  OCI_CLI_REGION: "eu-paris-1"
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Cache pip packages
        id: cache-pip
        uses: actions/cache@v4
        with:
          path: ~/.local
          key: ${{ runner.os }}-pip-oci-cli-v1
      - name: Add OCI CLI to path
        run: echo "$HOME/.local/bin" >> $GITHUB_PATH
      - name: Setup OCI CLI and Try to Create VM
        id: create_vm
        # This forces the job to succeed so the cache will save.
        continue-on-error: true
        run: |
          set -o pipefail
          # Make sure no stray OCI_CLI_* env vars override our clean config file
          unset OCI_CLI_USER OCI_CLI_TENANCY OCI_CLI_FINGERPRINT OCI_CLI_KEY_CONTENT OCI_CLI_KEY_FILE
          pip install oci-cli
          sudo apt-get update -y && sudo apt-get install -y jq
          mkdir -p ~/.oci
          echo "${{ secrets.OCI_CLI_KEY_CONTENT }}" > ~/.oci/oci_api_key.pem
          chmod 600 ~/.oci/oci_api_key.pem

          # Sanitize each secret: strip stray CR/LF and leading/trailing whitespace
          # that may have been picked up when copy-pasting OCIDs, fingerprints, etc.
          CLEAN_USER=$(printf '%s' "${{ secrets.OCI_CLI_USER }}" | tr -d '\r\n' | xargs)
          CLEAN_TENANCY=$(printf '%s' "${{ secrets.OCI_CLI_TENANCY }}" | tr -d '\r\n' | xargs)
          CLEAN_FINGERPRINT=$(printf '%s' "${{ secrets.OCI_CLI_FINGERPRINT }}" | tr -d '\r\n' | xargs)
          CLEAN_COMPARTMENT=$(printf '%s' "${{ secrets.OCI_COMPARTMENT_ID }}" | tr -d '\r\n' | xargs)
          CLEAN_SUBNET=$(printf '%s' "${{ secrets.OCI_SUBNET_ID }}" | tr -d '\r\n' | xargs)

          echo "[DEFAULT]" > ~/.oci/config
          echo "user=$CLEAN_USER" >> ~/.oci/config
          echo "tenancy=$CLEAN_TENANCY" >> ~/.oci/config
          echo "fingerprint=$CLEAN_FINGERPRINT" >> ~/.oci/config
          echo "key_file=~/.oci/oci_api_key.pem" >> ~/.oci/config
          echo "region=${{ env.OCI_CLI_REGION }}" >> ~/.oci/config
          echo "${{ secrets.SSH_PUBLIC_KEY }}" > /home/runner/my_ssh_key.pub

          # Overwrite the env-based IDs with the sanitized versions for the rest of the script
          COMPARTMENT_ID="$CLEAN_COMPARTMENT"
          SUBNET_ID="$CLEAN_SUBNET"

          echo "--- Sanity check (lengths, should be non-zero and look like OCIDs) ---"
          echo "user length: ${#CLEAN_USER}"
          echo "tenancy length: ${#CLEAN_TENANCY}"
          echo "fingerprint: $CLEAN_FINGERPRINT"
          echo "compartment length: ${#CLEAN_COMPARTMENT}"
          echo "subnet length: ${#CLEAN_SUBNET}"

          echo "--- Listing all Canonical Ubuntu aarch64 images available in this region ---"
          oci compute image list \
            --compartment-id "$COMPARTMENT_ID" \
            --operating-system "Canonical Ubuntu" \
            --shape "VM.Standard.A1.Flex" \
            --all \
            --query "data[*].{Name:\"display-name\", ID:id}" \
            --output table 2>&1 || echo "LIST COMMAND FAILED (see above for error)"

          echo "--- Resolving specific image OCID ---"
          IMAGE_ID=$(oci compute image list \
            --compartment-id "$COMPARTMENT_ID" \
            --operating-system "Canonical Ubuntu" \
            --shape "VM.Standard.A1.Flex" \
            --sort-by TIMECREATED \
            --sort-order DESC \
            --raw-output \
            --query "data[?contains(\"display-name\", '22.04-Minimal-aarch64')] | [0].id" 2>&1) || true

          echo "Resolved IMAGE_ID: $IMAGE_ID"

          if [ -z "$IMAGE_ID" ] || [[ "$IMAGE_ID" == *"ServiceError"* ]] || [[ "$IMAGE_ID" == "null" ]]; then
            echo "Could not resolve a valid image ID. Falling back to first available Canonical Ubuntu aarch64 image."
            IMAGE_ID=$(oci compute image list \
              --compartment-id "$COMPARTMENT_ID" \
              --operating-system "Canonical Ubuntu" \
              --shape "VM.Standard.A1.Flex" \
              --sort-by TIMECREATED \
              --sort-order DESC \
              --raw-output \
              --query "data[?contains(\"display-name\", 'aarch64')] | [0].id" 2>&1) || true
            echo "Fallback IMAGE_ID: $IMAGE_ID"
          fi

          # Run the command, capture ALL output, and use '|| true' to prevent the script from exiting early.
          OCI_OUTPUT=$(oci compute instance launch \
            --compartment-id "$COMPARTMENT_ID" \
            --availability-domain "$AD_NAME" \
            --shape "VM.Standard.A1.Flex" \
            --shape-config '{"ocpus":2,"memoryInGBs":12}' \
            --subnet-id "$SUBNET_ID" \
            --image-id "$IMAGE_ID" \
            --ssh-authorized-keys-file "/home/runner/my_ssh_key.pub" \
            --assign-public-ip true \
            --display-name "wordpress-vm" \
            --boot-volume-size-in-gbs 50 2>&1) || true
          # Store the log as a GitHub step output
          echo "log_data<<EOF" >> $GITHUB_OUTPUT
          echo "$OCI_OUTPUT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          echo "--- Instance launch output ---"
          echo "$OCI_OUTPUT"
          # Check the log content for an error string.
          if echo "$OCI_OUTPUT" | grep -q '"lifecycle-state": "PROVISIONING"'; then
            echo "Success! 'PROVISIONING' state found in output."
            exit 0
          else
            echo "Error: Success string not found in OCI output. Failing the step."
            exit 1
          fi
      - name: Send Discord Notification
        if: always() && env.DISCORD_WEBHOOK_URL != ''
        uses: sarisia/actions-status-discord@v1.15.4
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK_URL }}
          title: "OCI VM Status: ${{ steps.create_vm.outcome }}"
          status: ${{ steps.create_vm.outcome }}
          color: ${{ steps.create_vm.outcome == 'success' && '0x28a745' || '0xdc3545' }}
          description: |
            Attempt to create A1.Flex VM.
            **Status:** `${{ steps.create_vm.outcome }}`
            **Log Output:**
            ```json
            ${{ steps.create_vm.outputs.log_data }}
            ```
